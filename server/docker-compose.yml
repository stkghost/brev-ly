  db:
    image: postgres:latest
    container_name: brevly_server_database
    restart: unless-stopped
    ports:
      - 5473:5432
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=brevly_server_database
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - db
      - brevly

volumes:
  db:
networks:
  brevly:
    driver: bridge
  db:
    driver: bridge
